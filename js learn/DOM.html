<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>DOM Практика</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .card {
            border: 2px solid #333;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        .highlight {
            background-color: #ffeb3b;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1 id="greeting">Привет, гость!</h1>
        <input type="text" id="nameInput" placeholder="Введите ваше имя">
        <br><br>
        <button id="changeBtn">Изменить приветствие</button>
        <button id="themeBtn">Переключить тему</button>
        <p id="liveText">Текст будет меняться здесь...</p>
    </div>

    <script src="DOM.js"></script>
</body>

</html>
